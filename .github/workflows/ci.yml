name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Compile sources
        run: PYTHONPYCACHEPREFIX="$RUNNER_TEMP/mac-dev-clean-pycache" python -m compileall -q src tests

      - name: Audit public repository files
        if: matrix.python-version == '3.13'
        run: ./scripts/audit_public_repo.sh

  native-macos-ui:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Swift package tests
        run: swift test --package-path macos

      - name: Build native app without signing
        run: >-
          xcodebuild
          -project macos/MacDevClean.xcodeproj
          -scheme MacDevCleanApp
          -configuration Release
          -destination 'generic/platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build
