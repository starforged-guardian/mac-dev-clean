name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Compile sources
        run: PYTHONPYCACHEPREFIX="$RUNNER_TEMP/mac-dev-clean-pycache" python -m compileall -q src tests

      - name: Audit public repository files
        if: matrix.python-version == '3.13'
        run: ./scripts/audit_public_repo.sh

  native-macos-ui:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Swift package tests
        run: swift test --package-path macos

      - name: Build native app without signing
        run: >-
          xcodebuild
          -project macos/MacDevClean.xcodeproj
          -scheme MacDevCleanApp
          -configuration Release
          -destination 'generic/platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build
