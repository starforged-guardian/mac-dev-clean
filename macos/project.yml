name: MacDevClean

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SDKROOT: macosx
    SWIFT_VERSION: "6.0"

targets:
  MacDevCleanApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    productName: mac-dev-clean
    sources:
      - path: Sources/MacDevCleanApp
      - path: AppBundle/AppIcon.icns
        buildPhase: resources
      - path: ../assets/mac-dev-clean-logo.png
        buildPhase: resources
      - path: ../raven_vector_logos/raven-vector-dark.png
        buildPhase: resources
      - path: ../raven_vector_logos/raven-vector-dark-trans.png
        buildPhase: resources
      - path: ../LICENSE
        buildPhase: resources
      - path: ../BRANDING.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravenvector.mac-dev-clean
        PRODUCT_NAME: mac-dev-clean
        PRODUCT_MODULE_NAME: MacDevCleanApp
        EXECUTABLE_NAME: MacDevCleanApp
        INFOPLIST_FILE: AppBundle/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.5.2"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
        Release:
          ONLY_ACTIVE_ARCH: NO
    postBuildScripts:
      - name: Bundle Python cleanup engine
        inputFiles:
          - $(SRCROOT)/../src/mac_dev_clean/__init__.py
          - $(SRCROOT)/../src/mac_dev_clean/__main__.py
          - $(SRCROOT)/../src/mac_dev_clean/age.py
          - $(SRCROOT)/../src/mac_dev_clean/cleaner.py
          - $(SRCROOT)/../src/mac_dev_clean/cli.py
          - $(SRCROOT)/../src/mac_dev_clean/model.py
          - $(SRCROOT)/../src/mac_dev_clean/output.py
          - $(SRCROOT)/../src/mac_dev_clean/scanner.py
          - $(SRCROOT)/../src/mac_dev_clean/sim_prune.py
          - $(SRCROOT)/../src/mac_dev_clean/xcode_sim_prune.py
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/__init__.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/__main__.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/age.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/cleaner.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/cli.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/model.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/output.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/scanner.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/sim_prune.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/mac_dev_clean/xcode_sim_prune.py
        script: |
          ENGINE_SOURCE="${SRCROOT}/../src/mac_dev_clean"
          ENGINE_DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/python/mac_dev_clean"
          /bin/mkdir -p "${ENGINE_DEST}"
          /bin/cp "${ENGINE_SOURCE}"/*.py "${ENGINE_DEST}/"
    scheme:
      gatherCoverageData: true
      testTargets:
        - MacDevCleanAppTests

  MacDevCleanAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/MacDevCleanAppTests
    dependencies:
      - target: MacDevCleanApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravenvector.mac-dev-clean.tests
        PRODUCT_NAME: MacDevCleanAppTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/mac-dev-clean.app/Contents/MacOS/MacDevCleanApp
        CODE_SIGN_STYLE: Automatic
